# Parameters for the `jog_ui` node (browser jog panel).
# The `/**` wildcard applies these to the node regardless of its remapped name.
# Interface names/limits mirror config/test_arm.yaml — keep them in sync.
/**:
  ros__parameters:
    # --- Interface names (verify against `ros2 action list`) ---
    joint_trajectory_action: "/joint_trajectory_controller/follow_joint_trajectory"
    gripper_action: "/robotiq_gripper_controller/gripper_cmd"
    joint_states_topic: "/joint_states"
    switch_controller_service: "/controller_manager/switch_controller"
    controller_to_deactivate: "joint_trajectory_controller"
    clear_faults_service: ""

    # --- Joints (verify against `ros2 topic echo /joint_states --once`) ---
    joint_names: ["joint_1", "joint_2", "joint_3", "joint_4", "joint_5", "joint_6", "joint_7"]

    # --- Safety / behavior ---
    # NOTE: dry_run here is ALWAYS overridden by the launch argument (default true).
    # Use `ros2 launch adl_primitives jog_ui.launch.py dry_run:=false` to move.
    dry_run: true
    max_nudge_deg: 20.0        # hard clamp inside the primitive (applies to every nudge)
    move_time_s: 5.0           # default move duration for primitives that don't override it
    server_wait_timeout_s: 10.0
    joint_state_max_age_s: 1.0 # refuse to jog from joint_states older than this

    # --- Web UI ---
    ui_host: "0.0.0.0"         # bind address; 127.0.0.1 to restrict to the Jetson itself
    ui_port: 8080
    max_step_deg: 5.0          # largest step the UI may request per click (joint mode)
    step_time_s: 2.0           # seconds per jog step (larger = slower)

    # --- Joystick (Cartesian velocity) mode ---
    # NOTE: the twist_controller path below is REAL hardware only; for fake
    # hardware use the sim_jtc backend further down (launch with sim:=true).
    twist_topic: "/twist_controller/commands"
    twist_controller_name: "twist_controller"
    list_controllers_service: "/controller_manager/list_controllers"
    max_linear_mps: 0.10       # top speed at 100% slider (10 cm/s); <= 0 locks joystick out
    max_angular_rps: 0.3       # reserved for future rotation control (rad/s; converted to deg/s at the wire)
    twist_timeout_s: 0.3       # deadman: stream older than this is zeroed
    # ros2_kortex interprets twists in the TOOL frame (hardcoded), so base-frame
    # joystick commands are rotated via TF using these frames:
    base_frame: "base_link"
    tool_frame: "end_effector_link"
    tf_max_age_s: 0.5          # refuse to move if the tool TF is older than this

    # --- Sim backend (launch with sim:=true; overrides this) ---
    # 'kortex' = real twist_controller; 'sim_jtc' = differential IK streamed
    # through the trajectory controller (fake-hardware testing in Foxglove).
    twist_backend: "kortex"
    sim_max_joint_rps: 0.5     # per-joint speed clamp for the IK steps
    jtc_stream_topic: "/joint_trajectory_controller/joint_trajectory"

    # --- Home pose (Kinova bent-elbow Home; well-conditioned for jogging.
    #     The all-zeros candle pose is SINGULAR: only forward/back works there) ---
    home_pose_rad: [0.0, 0.262, 3.142, -2.269, 0.0, 0.960, 1.571]
    home_time_s: 6.0

    # --- Gripper (Robotiq 2F-85) ---
    gripper_open_position: 0.0
    gripper_close_position: 0.7
    gripper_max_effort: 20.0

    # --- E-stop ---
    estop_deactivate_controller: true
