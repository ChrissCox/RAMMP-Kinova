# Parameters for the Milestone-1 `hello_arm` node.
# The `/**` wildcard applies these to the node regardless of its remapped name.
# Tune the names/limits here after checking the real interfaces on the Jetson
# (ros2 action list / ros2 control list_controllers / ros2 topic echo /joint_states).
/**:
  ros__parameters:
    # --- Interface names (verify against `ros2 action list`) ---
    joint_trajectory_action: "/joint_trajectory_controller/follow_joint_trajectory"
    gripper_action: "/robotiq_gripper_controller/gripper_cmd"
    joint_states_topic: "/joint_states"
    switch_controller_service: "/controller_manager/switch_controller"
    controller_to_deactivate: "joint_trajectory_controller"

    # Clear-faults service: OFF by default. Set the real name+type once confirmed
    # on the Jetson (`ros2 service list | grep -i fault`). Assumes std_srvs/srv/Trigger.
    clear_faults_service: ""

    # --- Joints (verify against `ros2 topic echo /joint_states --once`) ---
    joint_names: ["joint_1", "joint_2", "joint_3", "joint_4", "joint_5", "joint_6", "joint_7"]

    # --- Safety / behavior ---
    dry_run: true              # true = connect + print plan, DO NOT move. Set false to move.
    nudge_joint_index: 6       # which joint to nudge (0-based); 6 == joint_7 (wrist)
    nudge_deg: 8.0             # how far to nudge, in degrees
    max_nudge_deg: 20.0        # hard clamp; nudges larger than this are reduced
    move_time_s: 5.0           # seconds per move (larger = slower)
    server_wait_timeout_s: 10.0

    # --- Gripper (Robotiq 2F-85; verify range on the Jetson) ---
    gripper_open_position: 0.0
    gripper_close_position: 0.7
    gripper_max_effort: 20.0

    # --- E-stop ---
    estop_deactivate_controller: true   # on soft-stop, also deactivate the motion controller
