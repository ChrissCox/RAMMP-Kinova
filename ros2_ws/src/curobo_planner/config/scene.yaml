# Simulated obstacle course + named targets for the cuRobo demo.
# ONE source of truth: the planner builds cuRobo's collision world from these
# obstacles AND draws them in Foxglove, so what you see is what it avoids.
#
# Frame: base_link (arm base at origin, +x forward, +z up). Metres + degrees.
# The planner reloads this file on EVERY command, so you can edit a pose and
# just re-send "go to X" — no node restart needed.
#
# NOTE: cuRobo's ee_link for the Gen3 is `tool_frame` (the wrist flange), NOT
# the fingertips. Target poses place the FLANGE there. If a plan fails, tune the
# target position/rpy_deg below — that is the expected first-run loop.

base_frame: base_link

# Axis-aligned-ish boxes the arm must route around (collision + display).
obstacles:
  - name: table
    position: [0.5, 0.0, -0.10]      # top at -0.07, clears the arm base with margin
    dims: [1.0, 1.2, 0.06]
    color: [0.45, 0.32, 0.22, 1.0]   # solid wood
  - name: back_wall
    position: [0.78, 0.0, 0.4]
    dims: [0.04, 1.2, 0.9]
    color: [0.68, 0.70, 0.73, 1.0]
  - name: cabinet
    position: [0.55, -0.38, 0.28]    # a box on the right the arm must avoid
    dims: [0.30, 0.30, 0.55]
    color: [0.38, 0.26, 0.17, 1.0]   # dark wood
  - name: shelf
    position: [0.55, 0.42, 0.50]     # overhead shelf, clear of the arm's Home pose
    dims: [0.34, 0.30, 0.03]
    color: [0.45, 0.32, 0.22, 1.0]

# Props: rendered in MuJoCo (free=true -> real physics, rests on furniture)
# and in Foxglove, but NOT in cuRobo's collision world — these are the things
# the arm reaches FOR. box: dims / cylinder: radius+height / sphere: radius.
objects:
  - name: bottle
    type: cylinder
    radius: 0.033
    height: 0.22
    position: [0.48, 0.10, 0.04]     # standing on the table top (-0.07)
    color: [0.25, 0.55, 0.85, 1.0]
    free: true
    density: 300.0
  - name: mug
    type: cylinder
    radius: 0.032
    height: 0.09
    position: [0.52, 0.40, 0.56]     # standing on the shelf top (0.515)
    color: [0.8, 0.25, 0.2, 1.0]
    free: true
  - name: cabinet_door
    type: box
    dims: [0.015, 0.24, 0.44]
    position: [0.395, -0.38, 0.30]   # flush on the cabinet's front face
    color: [0.30, 0.20, 0.13, 1.0]
  - name: cabinet_handle_bar
    type: box
    dims: [0.02, 0.025, 0.12]
    position: [0.378, -0.27, 0.34]   # the handle the cabinet_handle target points at
    color: [0.75, 0.75, 0.78, 1.0]
  - name: shelf_post_front
    type: box
    dims: [0.03, 0.03, 0.555]
    position: [0.68, 0.30, 0.2075]   # table top -> shelf underside
    color: [0.35, 0.25, 0.17, 1.0]
  - name: shelf_post_back
    type: box
    dims: [0.03, 0.03, 0.555]
    position: [0.68, 0.54, 0.2075]
    color: [0.35, 0.25, 0.17, 1.0]

# Named goals for the flange (tool_frame). keywords/description feed the NL layer.
targets:
  - name: bottle
    # Flange at 0.30 tool-down puts the FINGERTIPS just above the bottle's cap
    # (bottle top = 0.15): "go to the bottle" hovers over it without knocking
    # it — the bottle is a free body with real physics.
    position: [0.48, 0.10, 0.30]
    rpy_deg: [180, 0, 0]             # tool pointing down
    keywords: [bottle, water, drink, cup]
    description: a water bottle standing on the table in front-left
  - name: cabinet_handle
    # 10 cm standoff from the cabinet face (x=0.40): the wrist collision spheres
    # are r=0.05, so anything closer puts the goal state in collision.
    position: [0.30, -0.24, 0.34]
    rpy_deg: [180, 0, 0]
    keywords: [cabinet, handle, door, cupboard, drawer]
    description: the handle on the cabinet door to the right
  - name: shelf_edge
    position: [0.30, 0.40, 0.48]     # in front of the shelf's near face, same standoff rule
    rpy_deg: [180, 0, 0]
    keywords: [shelf, ledge, top]
    description: the front edge of the shelf on the left
  - name: rest
    position: [0.35, 0.0, 0.45]
    rpy_deg: [180, 0, 0]
    keywords: [rest, middle, center, neutral, ready]
    description: a neutral ready position out in front
