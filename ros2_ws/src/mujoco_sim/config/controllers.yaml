# Controllers for the MuJoCo backend — SAME names as the kortex bringup, so
# the planner's topics carry over unchanged to the real arm later.
controller_manager:
  ros__parameters:
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    robotiq_gripper_controller:
      type: position_controllers/GripperActionController

joint_trajectory_controller:
  ros__parameters:
    joints: [joint_1, joint_2, joint_3, joint_4, joint_5, joint_6, joint_7]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false
    open_loop_control: false

robotiq_gripper_controller:
  ros__parameters:
    joint: robotiq_85_left_knuckle_joint
    # A close onto a wide object CREEPS (~5 mrad/s squeezing the 64 mm
    # mug) instead of stopping dead — the default stall detector
    # (velocity < 1 mrad/s) never fired, the action never returned, and
    # the planner's timeout misread a held mug as 'closed on air'.
    # Slow creep against an object IS a stall, and a stall IS success.
    allow_stalling: true
    stall_velocity_threshold: 0.02
    stall_timeout: 0.7
